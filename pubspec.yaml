name: safesteps
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_tiled: ^3.0.11
  flame_audio: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/earthquake/Backgrounds/
    - assets/characters/
    - assets/earthquake/Objects/
    - assets/earthquake/Buttons/
    - assets/audio/
    - assets/images/
    - assets/images/earthquake/
    - assets/images/earthquake/backgrounds/
    - assets/images/earthquake/objects/
    - assets/images/earthquake/buttons/
    - assets/images/earthquake/comic/
    - assets/images/earthquake/characters/
    - assets/fonts/
    - assets/earthquake/comics/

  # fonts
  fonts:
    - family: Cherry Bomb One
      fonts:
        - asset: assets/fonts/CherryBombOne-Regular.ttf
    - family: Comic Relief
      fonts:
        - asset: assets/fonts/ComicRelief-Regular.ttf
          weight: 400
        - asset: assets/fonts/ComicRelief-Bold.ttf
          weight: 700

### Color Scheme
# Primary: #00a5ff
