name: mygame
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_tiled: ^3.0.11
  flame_audio: ^2.12.0
  soundpool: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/earthquake/Backgrounds/
    - assets/characters/
    - assets/earthquake/Objects/
    - assets/earthquake/Buttons/
    - assets/audio/
  #   - images/a_dot_ham.jpeg
